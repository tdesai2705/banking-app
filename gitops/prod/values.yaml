# Production Environment Configuration
# Auto-updated by CloudBees CI/CD pipeline

image:
  repository: tejasdesai27/banking-app
  tag: latest  # Updated automatically by CloudBees workflow
  pullPolicy: Always

replicaCount: 5

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 90
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  springDatasourceUrl: "jdbc:h2:mem:bankingdb"
  serverPort: "8080"
