# GitHub Actions Workflow for Smart Tests GitHub App Experiment
#
# PURPOSE: This workflow is ONLY for Naoto Ono's Smart Tests GitHub App experiment
# to generate observed confidence curves from historical data.
#
# IMPORTANT: This does NOT affect the CloudBees Unify CI/CD workflows in .cloudbees/
# Those workflows are for the actual banking-app assignment and remain unchanged.
#
# This workflow runs SEPARATELY on GitHub Actions infrastructure and uploads
# test results to help Smart Tests team build their GitHub App integration.
#
# Request from: Naoto Ono (Smart Tests Product Team)
# Date: 2026-05-29
# Confluence: https://cloudbees.atlassian.net/wiki/x/QoA0gQE

name: Smart Tests GitHub App - Data Collection

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: mvn test
        continue-on-error: true

      - name: Store Test Results for Smart Tests
        if: always()
        uses: cloudbees-oss/smart-tests-results-upload-action@v1
        with:
          files: '**/target/surefire-reports/*.xml'

      - name: Upload test results as artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/*.xml
            **/target/surefire-reports/*.txt
          retention-days: 30
