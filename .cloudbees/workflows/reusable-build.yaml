# CloudBees Unify Reusable Workflow for Building Docker Images with Kaniko
# Banking App - Java/Spring Boot

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Build Reusable Workflow

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      dockerfile-path:
        required: false
        type: string
        default: './Dockerfile'
      context:
        required: false
        type: string
        default: '.'
    outputs:
      artifact-id:
        description: CloudBees artifact ID
        value: ${{ jobs.build-and-push.outputs.artifact-id }}
      artifact-url:
        description: Docker image URL
        value: ${{ jobs.build-and-push.outputs.artifact-url }}
  workflow_dispatch:
    inputs:
      image-tag:
        type: string
        required: false
        default: latest
        description: Docker image tag

# CloudBees Unify permissions format
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  build-and-push:
    outputs:
      artifact-id: ${{ steps.register-artifact.outputs.artifact-id }}
      artifact-url: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ cloudbees.scm.sha }}
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      # Step 2: Configure Docker Hub credentials
      - name: Configure Docker Hub credentials
        id: dockerconfig
        uses: cloudbees-io/configure-oci-credentials@v1
        with:
          registry: index.docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build and push with Kaniko
      - name: Build and push Docker image
        id: kaniko-build
        uses: cloudbees-io/kaniko@v1
        kind: build
        with:
          destination: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ cloudbees.scm.sha }},${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:latest
          context: ${{ inputs.context }}
          dockerfile: ${{ inputs.dockerfile-path }}
          verbosity: info

      # Step 4: Register artifact
      - name: Register artifact
        id: register-artifact
        uses: cloudbees-io/register-artifact@v1
        with:
          name: ${{ inputs.image-name }}
          version: ${{ cloudbees.scm.sha }}
          registry-url: https://index.docker.io
          artifact-url: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ cloudbees.scm.sha }}
          artifact-type: container

      # Step 5: Publish build evidence
      - name: Publish build evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Build Evidence - Banking App
            - Run ID: ${{ cloudbees.run_id }}
            - Branch: ${{ cloudbees.scm.branch }}
            - Commit: ${{ cloudbees.scm.sha }}
            - Docker Image: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ cloudbees.scm.sha }}
            - Also tagged as: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:latest
            - Image Digest: ${{ steps.kaniko-build.outputs.digest }}
            - Artifact ID: ${{ steps.register-artifact.outputs.artifact-id }}
            - Build Status: Successfully built and pushed to Docker Hub ✅
