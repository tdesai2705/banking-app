# CloudBees Unify Deploy Workflow
# Deploys Banking App to Kubernetes

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Deploy Banking App

on:
  workflow_call:
    inputs:
      artifact-id:
        required: true
        type: string
        description: The artifact ID to deploy
      environment:
        required: true
        type: string
        description: Target environment (dev/staging/prod)
  workflow_dispatch:
    inputs:
      artifact-id:
        required: true
        type: string
        description: The artifact ID to deploy
      environment:
        required: true
        type: string
        description: Target environment (dev/staging/prod)
        default: dev

permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  deploy:
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Get artifact details
        id: artifact-details
        uses: cloudbees-io/get-artifact-details@v1
        with:
          artifact-id: ${{ inputs.artifact-id }}

      - name: Verify Kubernetes access with kubectl
        uses: docker://bitnami/kubectl:latest
        shell: sh
        run: |
          # Create kubeconfig from secret
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

          # Verify connection
          echo "Verifying Kubernetes cluster connection..."
          kubectl cluster-info

          # Check if namespace exists
          NAMESPACE="tejas-${{ inputs.environment }}"
          if kubectl get namespace $NAMESPACE 2>/dev/null; then
            echo "Namespace $NAMESPACE already exists"
          else
            echo "Namespace $NAMESPACE will be created by Helm"
          fi

      - name: Install Helm chart
        id: install-chart
        uses: cloudbees-io/helm-install@v1
        with:
          chart-location: ${{ cloudbees.workspace }}/chart
          release-name: banking-app-${{ inputs.environment }}
          namespace: tejas-${{ inputs.environment }}
          create-namespace: true
          values: |
            image:
              repository: tejasdesai27/banking-app
              tag: ${{ steps.artifact-details.outputs.version }}
              pullPolicy: IfNotPresent
            env:
              springDatasourceUrl: ${{ vars.DATABASE_URL }}
              serverPort: ${{ vars.API_PORT }}

      - name: Verify deployment with kubectl
        uses: docker://bitnami/kubectl:latest
        shell: sh
        run: |
          # Set kubeconfig
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

          NAMESPACE="tejas-${{ inputs.environment }}"

          echo "Checking deployment status..."
          kubectl get deployments -n $NAMESPACE

          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/banking-app -n $NAMESPACE --timeout=5m

          echo "Getting pod status..."
          kubectl get pods -n $NAMESPACE -l app=banking-app

          echo "Getting service details..."
          kubectl get service banking-app -n $NAMESPACE

          echo "Deployment successful to $NAMESPACE!"

      - name: Publish deployment evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Deployment Evidence - Banking App
            - Environment: ${{ inputs.environment }}
            - Namespace: tejas-${{ inputs.environment }}
            - Release Name: banking-app-${{ inputs.environment }}
            - Artifact ID: ${{ inputs.artifact-id }}
            - Image: tejasdesai27/banking-app:${{ steps.artifact-details.outputs.version }}
            - Deployment Method: Helm Chart
            - Deployment Status: Success ✅
            - Run ID: ${{ cloudbees.run_id }}
            - Database URL: ${{ vars.DATABASE_URL }}
            - API Port: ${{ vars.API_PORT }}

      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.artifact-id }}
          target-environment: ${{ inputs.environment }}
