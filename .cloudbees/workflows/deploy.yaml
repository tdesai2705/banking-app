# CloudBees Unify Deploy Workflow
# Deploys Banking App to Kubernetes
# Updated: 2026-04-07 20:20 - Namespace fix

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Deploy Banking App

on:
  workflow_call:
    inputs:
      artifact-id:
        required: true
        type: string
        description: The artifact ID to deploy
      artifact-url:
        required: true
        type: string
        description: The artifact URL (Docker image)
      environment:
        required: true
        type: string
        description: Target environment (qa/staging/prod)
  workflow_dispatch:
    inputs:
      artifact-id:
        required: true
        type: string
        description: The artifact ID to deploy
      artifact-url:
        required: true
        type: string
        description: The artifact URL (Docker image)
      environment:
        required: true
        type: string
        description: Target environment (qa/staging/prod)
        default: qa

permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  deploy:
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1
        with:
          repository: tdesai2705/banking-app

      - name: Set kubeconfig
        uses: cloudbees-days/setup-kubeconfig
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      # - name: Install Helm chart
      #   id: install-chart
      #   uses: cloudbees-io/helm-install@v1
      #   with:
      #     chart-location: ${{ cloudbees.workspace }}/chart
      #     release-name: banking-app-${{ inputs.environment }}
      #     namespace: ${{ vars.NAMESPACE }}
      #     values: |
      #       image:
      #         url: ${{ inputs.artifact-url }}
      #         pullPolicy: IfNotPresent
      - name: Install helm chart
        uses: docker://alpine/helm:latest
        shell: sh
        run: |
          # Create values file
          cat > /tmp/values.yaml <<EOF
          image:
            url: ${{ inputs.artifact-url }}
            pullPolicy: IfNotPresent
          EOF

          # Use helm upgrade --install (idempotent) with longer timeout
          helm upgrade --install banking-app ./chart \
            --namespace ${{ vars.NAMESPACE }} \
            --values /tmp/values.yaml \
            --timeout 10m \
            --debug

          echo "✅ Helm deployment initiated!"
          echo "Note: Deployment may still be rolling out. Checking status..."

      - name: Publish deployment evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Deployment Evidence - Banking App
            - Environment: ${{ inputs.environment }}
            - Namespace: ${{ vars.NAMESPACE }}
            - Release Name: banking-app-${{ inputs.environment }}
            - Artifact ID: ${{ inputs.artifact-id }}
            - Image: ${{ inputs.artifact-url }}
            - Deployment Method: Helm Chart
            - Deployment Status: Success ✅
            - Run ID: ${{ cloudbees.run_id }}
          format: MARKDOWN
