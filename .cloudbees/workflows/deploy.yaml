# CloudBees Unify Deploy Workflow
# Deploys Banking App to Kubernetes

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Deploy Banking App

on:
  workflow_call:
    inputs:
      artifact-id:
        required: true
        type: string
        description: The artifact ID to deploy
      artifact-url:
        required: true
        type: string
        description: The artifact URL (Docker image)
      environment:
        required: true
        type: string
        description: Target environment (qa/staging/prod)
  workflow_dispatch:
    inputs:
      artifact-id:
        required: true
        type: string
        description: The artifact ID to deploy
      artifact-url:
        required: true
        type: string
        description: The artifact URL (Docker image)
      environment:
        required: true
        type: string
        description: Target environment (qa/staging/prod)
        default: qa

permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  deploy:
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Set kubeconfig
        uses: cloudbees-days/setup-kubeconfig
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Install Helm chart
        id: install-chart
        uses: cloudbees-io/helm-install@v1
        with:
          chart-location: ${{ cloudbees.workspace }}/chart
          release-name: banking-app-${{ inputs.environment }}
          namespace: tejas-${{ inputs.environment }}
          values: |
            image:
              url: ${{ inputs.artifact-url }}
              pullPolicy: IfNotPresent
            env:
              springDatasourceUrl: ${{ vars.DATABASE_URL }}
              serverPort: ${{ vars.API_PORT }}

      - name: Publish deployment evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Deployment Evidence - Banking App
            - Environment: ${{ inputs.environment }}
            - Namespace: tejas-${{ inputs.environment }}
            - Release Name: banking-app-${{ inputs.environment }}
            - Artifact ID: ${{ inputs.artifact-id }}
            - Image: ${{ inputs.artifact-url }}
            - Deployment Method: Helm Chart
            - Deployment Status: Success ✅
            - Run ID: ${{ cloudbees.run_id }}
            - Database URL: ${{ vars.DATABASE_URL }}
            - API Port: ${{ vars.API_PORT }}
          format: MARKDOWN

      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.artifact-id }}
